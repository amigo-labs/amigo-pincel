# Release automation: every push to `main` publishes a new version.
#
# What "publish a new version" means here (see docs/RELEASING.md):
#   * always — compute the next SemVer, create the git tag + a GitHub
#     Release with auto-generated notes, and attach the built PWA bundle.
#   * guarded — deploy the web app to Cloudflare and/or publish the
#     `pincel-wasm` npm package, but ONLY when the matching repo secret
#     is present. Without the secret the job is skipped (never fails), so
#     nothing outward-facing happens until you opt in.
#
# Versioning is tag-based: the git tag is the source of truth, so the
# workflow never commits back to `main` and can't trigger itself. A push
# bumps the patch level; a manual run can pick patch / minor / major.
# The first ever release starts at v0.1.0 (matches the crate versions).

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump level'
        type: choice
        default: patch
        options: [patch, minor, major]

concurrency:
  # Serialize releases so two quick pushes can't race on the same tag.
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preflight:
    name: preflight (version + capability check)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      has_cloudflare: ${{ steps.caps.outputs.has_cloudflare }}
      has_npm: ${{ steps.caps.outputs.has_npm }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the version bump can read the latest
          # tag and the release notes can diff against it.
          fetch-depth: 0
      - name: compute next version
        id: version
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            ver="${latest#v}"
            IFS='.' read -r major minor patch <<EOF
          $ver
          EOF
            case "$BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              *)     patch=$((patch + 1)) ;;
            esac
            next="v${major}.${minor}.${patch}"
          fi
          echo "Previous tag: ${latest:-<none>}  ->  next: ${next}"
          echo "version=${next}" >> "$GITHUB_OUTPUT"
      - name: capability check (secret presence)
        id: caps
        run: |
          # `secrets.X != ''` is evaluated by the expression engine to a
          # literal true/false — the secret value never reaches the log.
          echo "has_cloudflare=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
          echo "has_npm=${{ secrets.NPM_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  release:
    name: build + GitHub Release
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: gate — rust core tests
        run: cargo test -p pincel-core -p aseprite-writer -p pincel-wasm
      - name: build wasm package (release profile)
        working-directory: ui
        run: pnpm wasm:build:release
      - name: optimize wasm (system binaryen)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y binaryen
          wasm="crates/pincel-wasm/pkg/pincel_wasm_bg.wasm"
          wasm-opt -O3 -o "$wasm" "$wasm"
          ls -lh "$wasm"
      - name: install ui dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile
      - name: build web app
        working-directory: ui
        env:
          VITE_APP_VERSION: ${{ needs.preflight.outputs.version }}
        run: pnpm build
      - name: package web bundle
        run: |
          set -euo pipefail
          ver="${{ needs.preflight.outputs.version }}"
          ( cd ui/dist && zip -qr "../../pincel-web-${ver}.zip" . )
          ls -lh "pincel-web-${ver}.zip"
      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.version }}
          name: ${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          files: pincel-web-${{ needs.preflight.outputs.version }}.zip
      - name: upload web bundle for downstream deploy
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: ui/dist
          retention-days: 7

  deploy-web:
    name: deploy web (Cloudflare — guarded)
    needs: [preflight, release]
    if: needs.preflight.outputs.has_cloudflare == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch built web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ui/dist
      - name: deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `ui/wrangler.toml` serves the prebuilt ui/dist as static
          # assets under its own Worker project (separate from the
          # marketing site's root wrangler.toml).
          workingDirectory: ui

  publish-npm:
    name: publish pincel-wasm to npm (guarded)
    needs: [preflight, release]
    if: needs.preflight.outputs.has_npm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: build wasm package (release profile)
        working-directory: ui
        run: pnpm wasm:build:release
      - name: optimize wasm (system binaryen)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y binaryen
          wasm="crates/pincel-wasm/pkg/pincel_wasm_bg.wasm"
          wasm-opt -O3 -o "$wasm" "$wasm"
          ls -lh "$wasm"
      - name: stamp package version
        working-directory: crates/pincel-wasm/pkg
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          # Tag is vX.Y.Z; npm wants X.Y.Z.
          npm version "${VERSION#v}" --no-git-tag-version --allow-same-version
      - name: publish
        working-directory: crates/pincel-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
