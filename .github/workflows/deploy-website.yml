# Build and deploy the Pincel marketing site to Cloudflare Pages.
#
# Triggers:
#   - push to `main` that touches website/                 → production deploy
#   - pull_request against any branch that touches website/ → preview deploy
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN  — API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#
# Cloudflare Pages project: `pincel-website` (matches website/wrangler.toml).

name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  pull_request:
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'

concurrency:
  group: deploy-website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: website
          command: >-
            pages deploy build
            --project-name=pincel-website
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-hash=${{ github.sha }}
