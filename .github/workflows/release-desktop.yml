# Desktop (Tauri) binaries — MANUAL trigger only.
#
# Kept separate from release.yml on purpose: a native 3-OS matrix is slow,
# and running it manually means a red desktop build never blocks the
# automatic web release. Trigger it from the Actions tab and point it at
# an existing release tag (created by release.yml); the built installers
# are attached to that release.
#
# The macOS `icon.icns` is now committed, so all three legs have their
# icons. Not yet exercised on real runners (this repo's dev env is
# headless) — the first manual run is the verification. Optional next
# step: code signing / notarization secrets for shippable macOS + Windows
# builds; unsigned binaries build fine but warn on launch.

name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach binaries to (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
          - platform: macos-latest
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: install linux system libraries
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: build wasm package
        working-directory: ui
        run: pnpm wasm:build:release
      - name: install ui dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile
      - name: build + attach desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tauri.conf.json's beforeBuildCommand builds ui/dist; the wasm
          # pkg + node_modules above are its prerequisites.
          projectPath: src-tauri
          tauriScript: pnpm --dir ../ui tauri
          releaseId: ${{ github.event.inputs.tag }}
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
