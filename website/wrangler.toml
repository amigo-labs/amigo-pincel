# Cloudflare Pages configuration for the Pincel marketing site.
#
# The SvelteKit static adapter writes its output to `build/`. Cloudflare Pages
# uploads that directory directly; no Workers runtime is involved (see
# docs/specs/website-spec.md §6.2 — "Static site generation. No SSR runtime.").
#
# Local: `pnpm build` produces `build/`.
# CI:    .github/workflows/deploy-website.yml runs `pnpm build` and invokes
#        `wrangler pages deploy build` with this project name.

name = "pincel-website"
compatibility_date = "2026-05-07"
pages_build_output_dir = "./build"
